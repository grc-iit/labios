services:
  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8222/healthz > /dev/null 2>&1"]
      interval: 2s
      timeout: 2s
      retries: 5
      start_period: 2s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 5
      start_period: 2s

  dispatcher:
    build: { context: ., target: dispatcher }
    depends_on:
      nats: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      LABIOS_NATS_URL: "nats://nats:4222"
      LABIOS_REDIS_HOST: "redis"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/labios-ready"]
      interval: 2s
      retries: 10
      start_period: 3s

  worker-1:
    build: { context: ., target: worker }
    depends_on:
      nats: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      LABIOS_NATS_URL: "nats://nats:4222"
      LABIOS_REDIS_HOST: "redis"
      LABIOS_WORKER_ID: "1"
      LABIOS_WORKER_SPEED: "5"
      LABIOS_WORKER_CAPACITY: "10GB"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/labios-ready"]
      interval: 2s
      retries: 10
      start_period: 3s

  worker-2:
    build: { context: ., target: worker }
    depends_on:
      nats: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      LABIOS_NATS_URL: "nats://nats:4222"
      LABIOS_REDIS_HOST: "redis"
      LABIOS_WORKER_ID: "2"
      LABIOS_WORKER_SPEED: "3"
      LABIOS_WORKER_CAPACITY: "50GB"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/labios-ready"]
      interval: 2s
      retries: 10
      start_period: 3s

  worker-3:
    build: { context: ., target: worker }
    depends_on:
      nats: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      LABIOS_NATS_URL: "nats://nats:4222"
      LABIOS_REDIS_HOST: "redis"
      LABIOS_WORKER_ID: "3"
      LABIOS_WORKER_SPEED: "1"
      LABIOS_WORKER_CAPACITY: "200GB"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/labios-ready"]
      interval: 2s
      retries: 10
      start_period: 3s

  manager:
    build: { context: ., target: manager }
    depends_on:
      nats: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      LABIOS_NATS_URL: "nats://nats:4222"
      LABIOS_REDIS_HOST: "redis"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/labios-ready"]
      interval: 2s
      retries: 10
      start_period: 3s

  test:
    build: { context: ., target: test }
    depends_on:
      dispatcher: { condition: service_healthy }
      worker-1: { condition: service_healthy }
      worker-2: { condition: service_healthy }
      worker-3: { condition: service_healthy }
      manager: { condition: service_healthy }
    environment:
      LABIOS_NATS_URL: "nats://nats:4222"
      LABIOS_REDIS_HOST: "redis"
