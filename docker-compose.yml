services:
  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8222/healthz > /dev/null 2>&1"]
      interval: 2s
      timeout: 2s
      retries: 5
      start_period: 2s

  redis:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: ["--logtostderr"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 5
      start_period: 2s

  redis-kv:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 5
      start_period: 2s

  dispatcher:
    build: { context: ., target: dispatcher }
    depends_on:
      nats: { condition: service_healthy }
      redis: { condition: service_healthy }
      manager: { condition: service_healthy }
    environment:
      LABIOS_NATS_URL: "nats://nats:4222"
      LABIOS_REDIS_HOST: "redis"
      LABIOS_SCHEDULER_POLICY: "${LABIOS_SCHEDULER_POLICY:-round-robin}"
      LABIOS_SCHEDULER_PROFILE: "${LABIOS_SCHEDULER_PROFILE:-}"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/labios-ready"]
      interval: 2s
      retries: 10
      start_period: 3s

  worker-1:
    build: { context: ., target: worker }
    depends_on:
      nats: { condition: service_healthy }
      redis: { condition: service_healthy }
      redis-kv: { condition: service_healthy }
      manager: { condition: service_healthy }
    environment:
      LABIOS_NATS_URL: "nats://nats:4222"
      LABIOS_REDIS_HOST: "redis"
      LABIOS_KV_HOST: "redis-kv"
      LABIOS_KV_PORT: "6379"
      LABIOS_WORKER_ID: "1"
      LABIOS_WORKER_SPEED: "5"
      LABIOS_WORKER_ENERGY: "1"
      LABIOS_WORKER_CAPACITY: "10GB"
    volumes:
      - worker-1-data:/labios/data
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/labios-ready"]
      interval: 2s
      retries: 10
      start_period: 3s

  worker-2:
    build: { context: ., target: worker }
    depends_on:
      nats: { condition: service_healthy }
      redis: { condition: service_healthy }
      redis-kv: { condition: service_healthy }
      manager: { condition: service_healthy }
    environment:
      LABIOS_NATS_URL: "nats://nats:4222"
      LABIOS_REDIS_HOST: "redis"
      LABIOS_KV_HOST: "redis-kv"
      LABIOS_KV_PORT: "6379"
      LABIOS_WORKER_ID: "2"
      LABIOS_WORKER_SPEED: "3"
      LABIOS_WORKER_ENERGY: "3"
      LABIOS_WORKER_CAPACITY: "50GB"
    volumes:
      - worker-2-data:/labios/data
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/labios-ready"]
      interval: 2s
      retries: 10
      start_period: 3s

  worker-3:
    build: { context: ., target: worker }
    depends_on:
      nats: { condition: service_healthy }
      redis: { condition: service_healthy }
      redis-kv: { condition: service_healthy }
      manager: { condition: service_healthy }
    environment:
      LABIOS_NATS_URL: "nats://nats:4222"
      LABIOS_REDIS_HOST: "redis"
      LABIOS_KV_HOST: "redis-kv"
      LABIOS_KV_PORT: "6379"
      LABIOS_WORKER_ID: "3"
      LABIOS_WORKER_SPEED: "1"
      LABIOS_WORKER_ENERGY: "5"
      LABIOS_WORKER_CAPACITY: "200GB"
    volumes:
      - worker-3-data:/labios/data
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/labios-ready"]
      interval: 2s
      retries: 10
      start_period: 3s

  manager:
    build: { context: ., target: manager }
    depends_on:
      nats: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      LABIOS_NATS_URL: "nats://nats:4222"
      LABIOS_REDIS_HOST: "redis"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/labios-ready"]
      interval: 2s
      retries: 10
      start_period: 3s

  test:
    build: { context: ., target: test }
    depends_on:
      dispatcher: { condition: service_healthy }
      worker-1: { condition: service_healthy }
      worker-2: { condition: service_healthy }
      worker-3: { condition: service_healthy }
      manager: { condition: service_healthy }
    environment:
      LABIOS_NATS_URL: "nats://nats:4222"
      LABIOS_REDIS_HOST: "redis"

  mcp:
    build: { context: ./mcp }
    depends_on:
      redis: { condition: service_healthy }
      dispatcher: { condition: service_healthy }
    environment:
      LABIOS_REDIS_HOST: "redis"
      LABIOS_REDIS_PORT: "6379"
    ports:
      - "8400:8400"
    stdin_open: true
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; redis.Redis(host='redis').ping()"]
      interval: 5s
      retries: 5
      start_period: 5s

volumes:
  worker-1-data:
  worker-2-data:
  worker-3-data:
