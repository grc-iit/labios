[nats]
url = "nats://localhost:4222"

[redis]
host = "localhost"
port = 6379

[worker]
id = 0
speed = 1
capacity = "1GB"

[client]
reply_timeout_ms = 30000

[label]
min_size = "64KB"
max_size = "1MB"

[cache]
flush_interval_ms = 500
default_read_policy = "read-through"

[intercept]
prefixes = ["/labios"]

[dispatcher]
batch_size = 100
batch_timeout_ms = 50
aggregation_enabled = true
dep_granularity = "per-file"
